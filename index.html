<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runewalker Dice Oracle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --ink: #0e0c0a;
    --parchment: #f5eed8;
    --parchment-dark: #e8dfc0;
    --ember: #c8440a;
    --ember-glow: #e8621a;
    --aether: #4a6fa5;
    --noxite: #6b2fa0;
    --noxite-glow: #9b5fd0;
    --gold: #b8920a;
    --gold-bright: #d4a812;
    --shadow: rgba(14,12,10,0.85);
    --success: #2d7a4f;
    --fail: #8b2020;
    --mixed: #7a5a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(74,111,165,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(107,47,160,0.10) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(200,68,10,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-sigil {
    font-size: 42px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(200,68,10,0.6));
    animation: sigil-pulse 3s ease-in-out infinite;
  }

  @keyframes sigil-pulse {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(200,68,10,0.6)); }
    50% { filter: drop-shadow(0 0 22px rgba(232,98,26,0.9)); }
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    letter-spacing: 0.12em;
    color: var(--parchment);
    text-shadow: 0 0 30px rgba(200,68,10,0.4);
  }

  .header .subtitle {
    font-style: italic;
    color: var(--parchment-dark);
    opacity: 0.7;
    font-size: 15px;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  /* Roll Categories */
  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border: 1px solid rgba(184,146,10,0.3);
    background: rgba(14,12,10,0.6);
    color: var(--parchment-dark);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .tab:hover { border-color: var(--gold); color: var(--parchment); }
  .tab.active {
    background: rgba(184,146,10,0.15);
    border-color: var(--gold-bright);
    color: var(--gold-bright);
    text-shadow: 0 0 8px rgba(212,168,18,0.5);
  }

  /* Roll Panel */
  .roll-panel {
    background: linear-gradient(135deg, rgba(20,17,12,0.95), rgba(14,12,10,0.98));
    border: 1px solid rgba(184,146,10,0.25);
    border-radius: 4px;
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .roll-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--ember), var(--gold), var(--ember), transparent);
  }

  .roll-context {
    margin-bottom: 20px;
  }

  .roll-context label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    display: block;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  .roll-context input {
    width: 100%;
    background: rgba(245,238,216,0.05);
    border: 1px solid rgba(184,146,10,0.2);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--parchment);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    font-style: italic;
    outline: none;
    transition: border-color 0.2s;
  }

  .roll-context input:focus {
    border-color: rgba(184,146,10,0.5);
  }

  .roll-context input::placeholder { opacity: 0.35; font-style: italic; }

  /* Dice Type Selector */
  .dice-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .dice-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    opacity: 0.8;
    margin-right: 4px;
  }

  .dice-btn {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(184,146,10,0.3);
    background: rgba(14,12,10,0.8);
    color: var(--parchment-dark);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
  }

  .dice-btn:hover { border-color: var(--gold); color: var(--parchment); transform: translateY(-1px); }
  .dice-btn.selected {
    background: rgba(184,146,10,0.15);
    border-color: var(--gold-bright);
    color: var(--gold-bright);
    box-shadow: 0 0 10px rgba(212,168,18,0.2);
  }

  /* Modifier */
  .mod-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .mod-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    opacity: 0.8;
  }

  .mod-btn {
    width: 32px; height: 32px;
    border: 1px solid rgba(184,146,10,0.3);
    background: transparent;
    color: var(--parchment);
    font-size: 18px;
    cursor: pointer;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }
  .mod-btn:hover { border-color: var(--gold); }

  .mod-value {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 600;
    min-width: 36px;
    text-align: center;
    color: var(--parchment);
  }

  .advantage-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .adv-btn {
    padding: 6px 14px;
    border: 1px solid rgba(184,146,10,0.25);
    background: transparent;
    color: var(--parchment-dark);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .adv-btn:hover { border-color: var(--gold); }
  .adv-btn.selected-adv { background: rgba(45,122,79,0.2); border-color: #4caf50; color: #7ddb9b; }
  .adv-btn.selected-dis { background: rgba(139,32,32,0.2); border-color: #c0392b; color: #e57373; }
  .adv-btn.selected-norm { background: rgba(184,146,10,0.15); border-color: var(--gold-bright); color: var(--gold-bright); }

  /* Roll Button */
  .roll-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, rgba(200,68,10,0.25), rgba(184,146,10,0.15));
    border: 1px solid var(--ember);
    color: var(--parchment);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .roll-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,68,10,0.3), rgba(184,146,10,0.2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .roll-btn:hover { border-color: var(--ember-glow); box-shadow: 0 0 20px rgba(200,68,10,0.3); }
  .roll-btn:hover::before { opacity: 1; }
  .roll-btn:active { transform: scale(0.99); }

  /* Result Display */
  .result-display {
    margin-top: 24px;
    text-align: center;
    display: none;
    animation: result-appear 0.4s ease-out;
  }

  @keyframes result-appear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-display.visible { display: block; }

  .dice-visual {
    font-size: 56px;
    display: block;
    margin-bottom: 8px;
    animation: dice-land 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 16px rgba(200,68,10,0.7));
  }

  @keyframes dice-land {
    from { transform: scale(0.3) rotate(180deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .roll-number {
    font-family: 'Cinzel', serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }

  .roll-number.critical { color: var(--gold-bright); text-shadow: 0 0 20px rgba(212,168,18,0.8); }
  .roll-number.success { color: #5dba7d; text-shadow: 0 0 16px rgba(93,186,125,0.6); }
  .roll-number.mixed { color: #d4a84a; text-shadow: 0 0 14px rgba(212,168,74,0.5); }
  .roll-number.failure { color: #c0392b; text-shadow: 0 0 16px rgba(192,57,43,0.6); }
  .roll-number.fumble { color: var(--noxite-glow); text-shadow: 0 0 20px rgba(155,95,208,0.8); }

  .roll-breakdown {
    font-size: 13px;
    color: var(--parchment-dark);
    opacity: 0.6;
    font-style: italic;
    margin-bottom: 12px;
  }

  .result-tier {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
    padding: 5px 16px;
    border-radius: 2px;
    display: inline-block;
  }

  .result-tier.critical { color: var(--gold-bright); border: 1px solid rgba(212,168,18,0.4); background: rgba(212,168,18,0.08); }
  .result-tier.success { color: #5dba7d; border: 1px solid rgba(93,186,125,0.3); background: rgba(93,186,125,0.06); }
  .result-tier.mixed { color: #d4a84a; border: 1px solid rgba(212,168,74,0.3); background: rgba(212,168,74,0.06); }
  .result-tier.failure { color: #e57373; border: 1px solid rgba(192,57,43,0.3); background: rgba(192,57,43,0.06); }
  .result-tier.fumble { color: var(--noxite-glow); border: 1px solid rgba(155,95,208,0.4); background: rgba(107,47,160,0.1); }

  .narrative-result {
    background: rgba(245,238,216,0.04);
    border: 1px solid rgba(184,146,10,0.15);
    border-left: 3px solid var(--ember);
    border-radius: 2px;
    padding: 16px 20px;
    text-align: left;
    font-size: 16px;
    line-height: 1.7;
    font-style: italic;
    color: var(--parchment);
    margin-bottom: 12px;
  }

  .result-writing-prompt {
    font-size: 13px;
    color: var(--aether);
    font-style: italic;
    opacity: 0.8;
    margin-top: 8px;
  }

  /* History */
  .history-section {
    margin-top: 32px;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(184,146,10,0.3), transparent);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(184,146,10,0.2) transparent;
  }

  .history-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(14,12,10,0.6);
    border: 1px solid rgba(184,146,10,0.1);
    border-radius: 2px;
    font-size: 14px;
    animation: result-appear 0.3s ease-out;
  }

  .history-roll {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 18px;
    min-width: 32px;
    text-align: center;
    flex-shrink: 0;
  }

  .history-roll.critical { color: var(--gold-bright); }
  .history-roll.success { color: #5dba7d; }
  .history-roll.mixed { color: #d4a84a; }
  .history-roll.failure { color: #e57373; }
  .history-roll.fumble { color: var(--noxite-glow); }

  .history-text { line-height: 1.4; }
  .history-context { font-style: italic; color: var(--parchment-dark); opacity: 0.6; font-size: 12px; }
  .history-outcome { font-size: 13px; color: var(--parchment-dark); opacity: 0.8; }

  .clear-btn {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(245,238,216,0.3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-left: auto;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: rgba(245,238,216,0.6); }

  /* Rolling animation overlay */
  .rolling-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .rolling-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .rolling-dice {
    font-size: 80px;
    animation: rolling 0.08s linear infinite;
  }

  @keyframes rolling {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(90deg) scale(1.1); }
    50% { transform: rotate(180deg) scale(1); }
    75% { transform: rotate(270deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* Quick rolls strip */
  .quick-roll-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .quick-roll-btn {
    padding: 5px 12px;
    border: 1px solid rgba(74,111,165,0.3);
    background: rgba(74,111,165,0.06);
    color: rgba(245,238,216,0.6);
    font-family: 'Crimson Pro', serif;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    font-style: italic;
  }

  .quick-roll-btn:hover {
    border-color: var(--aether);
    color: var(--parchment);
    background: rgba(74,111,165,0.12);
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    font-style: italic;
    color: rgba(245,238,216,0.2);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="rolling-overlay" id="rollingOverlay">
  <div class="rolling-dice">🎲</div>
</div>

<div class="container">
  <header class="header">
    <span class="header-sigil">✦</span>
    <h1>RUNEWALKER ORACLE</h1>
    <p class="subtitle">Writer's Dice System · Forged for the Runewalker Saga</p>
    <div class="divider"></div>
  </header>

  <!-- Category Tabs -->
  <div class="category-tabs">
    <button class="tab active" onclick="setCategory('general')" id="tab-general">GENERAL</button>
    <button class="tab" onclick="setCategory('seeker')" id="tab-seeker">SEEKER SKILL</button>
    <button class="tab" onclick="setCategory('combat')" id="tab-combat">COMBAT</button>
    <button class="tab" onclick="setCategory('shadow')" id="tab-shadow">THE SHADOW</button>
    <button class="tab" onclick="setCategory('social')" id="tab-social">SOCIAL</button>
    <button class="tab" onclick="setCategory('world')" id="tab-world">WORLD EVENT</button>
    <button class="tab" onclick="setCategory('investigation')" id="tab-investigation">INVESTIGATION</button>
  </div>

  <!-- Quick roll suggestions -->
  <div class="quick-roll-strip" id="quickRolls"></div>

  <!-- Main Roll Panel -->
  <div class="roll-panel">
    <div class="roll-context">
      <label>SCENE CONTEXT (optional — what is at stake?)</label>
      <input type="text" id="rollContext" placeholder="e.g. Rysen tries to read the priest's intentions..." />
    </div>

    <div class="dice-row">
      <span class="dice-label">DIE ·</span>
      <button class="dice-btn" onclick="selectDice(4)" id="d4">d4</button>
      <button class="dice-btn" onclick="selectDice(6)" id="d6">d6</button>
      <button class="dice-btn selected" onclick="selectDice(20)" id="d20">d20</button>
      <button class="dice-btn" onclick="selectDice(100)" id="d100">d%</button>
    </div>

    <div class="mod-row">
      <span class="mod-label">MODIFIER ·</span>
      <button class="mod-btn" onclick="changeMod(-1)">−</button>
      <span class="mod-value" id="modValue">+0</span>
      <button class="mod-btn" onclick="changeMod(1)">+</button>
    </div>

    <div class="mod-row" style="margin-bottom: 22px;">
      <span class="mod-label">ROLL MODE ·</span>
      <div class="advantage-row">
        <button class="adv-btn selected-adv" onclick="setAdvantage('advantage')" id="adv-advantage">ADVANTAGE</button>
        <button class="adv-btn" onclick="setAdvantage('normal')" id="adv-normal">NORMAL</button>
        <button class="adv-btn" onclick="setAdvantage('disadvantage')" id="adv-disadvantage">DISADVANTAGE</button>
      </div>
    </div>

    <button class="roll-btn" onclick="rollDice()">⬡ CAST THE BONES ⬡</button>

    <!-- Result Display -->
    <div class="result-display" id="resultDisplay">
      <span class="dice-visual" id="diceVisual">🎲</span>
      <div class="roll-number" id="rollNumber"></div>
      <div class="roll-breakdown" id="rollBreakdown"></div>
      <div class="result-tier" id="resultTier"></div>
      <div class="narrative-result" id="narrativeResult"></div>
      <div class="result-writing-prompt" id="writingPrompt"></div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="section-title">
      ROLL CHRONICLE
      <button class="clear-btn" onclick="clearHistory()">CLEAR</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <footer>Runewalker Saga · Writer's Tool · Roll for Fate</footer>
</div>

<script>
  let currentDice = 20;
  let modifier = 0;
  let advantage = 'advantage';
  let category = 'general';
  let rollHistory = [];

  const DICE_EMOJIS = { 4: '🔺', 6: '🎲', 20: '⬡', 100: '⭕' };

  const CATEGORIES = {
    general: {
      label: 'General',
      quick: ['Rysen perceives something wrong', 'Someone is hiding the truth', 'A choice with consequences'],
      outcomes: {
        fumble: ['Something breaks — a relationship, an object, or Rysen\'s composure. The world notices.', 'The attempt backfires in a way that creates a new problem. Double the complication.', 'Rysen\'s past judgment fails him here. The thing he didn\'t account for is exactly what matters.'],
        failure: ['The goal is not achieved. Something is lost in the attempt — time, trust, or positioning.', 'The action fails, and whoever witnessed it has now recalibrated their read on Rysen.', 'It doesn\'t work. And the window for trying again is closing.'],
        mixed: ['Partial success — the goal is within reach, but there is a price attached. Name it.', 'It works, but not cleanly. Something unwanted comes along for the ride.', 'Progress, but a complication surfaces that wasn\'t there before.'],
        success: ['Clear success. The world bends in Rysen\'s direction, at least for this moment.', 'It works as intended. The path forward is clearer than it was.', 'Success — and a small, unexpected detail that could matter later.'],
        critical: ['Exceptional. Not only does it work — it works in a way that changes what\'s possible next.', 'Maximum result. Something is revealed or unlocked that no lesser success would have found.', 'Critical. The moment crystallizes. Write it like Rysen earned this.']
      },
      prompts: ['How does this change the scene\'s tension?', 'Who witnesses this, and how do they read it?', 'What does Rysen tell himself about what just happened?']
    },
    seeker: {
      label: 'Seeker Skill',
      quick: ['Tracking a target through the Azuran Planes', 'Reading a monster\'s tell before it strikes', 'Navigating an unfamiliar city without a map'],
      outcomes: {
        fumble: ['Ember-rank inexperience shows — a trained Seeker would not have missed this. The gap between Rysen and the veterans is visible, to himself most of all.', 'The Seeker instinct misfires. He reads the environment wrong, and the wrong read puts him in a worse position than doing nothing.', 'A critical piece of information is missed. The trail goes cold. He\'ll have to find another angle.'],
        failure: ['His training doesn\'t stretch this far. He can see the shape of what he\'s missing, but not how to get there.', 'The skill exists in him — but untempered. A higher-rank Seeker would have had this. Rysen doesn\'t. Yet.', 'He tries the right approach at the wrong moment. Timing is also skill, and this is a lesson in timing.'],
        mixed: ['He gets most of it. The part he misses is the part that matters most — or will, later.', 'Competent, not excellent. He achieves the goal but leaves evidence, loose ends, or a witness he didn\'t account for.', 'The Seeker training holds — but barely. He came through it, and he knows he came through it by margin.'],
        success: ['Clean Seeker work. The training paid for itself. He reads the situation correctly and moves accordingly.', 'Exactly what an Ember-rank should be able to do, executed well. Somewhere, a Broker\'s assessment nudges upward.', 'The instinct and the training align. This is what he trained for, and it shows.'],
        critical: ['Beyond Ember. This is Iron-rank instinct in an Ember-rank body, and for a moment the gap between who he is and who he\'s becoming closes.', 'The Seeker in him operates at its ceiling. Whatever he was tracking, reading, or doing — he has it completely.', 'This is the moment that builds reputation. Not because anyone saw it — because he knows what he just did.']
      },
      prompts: ['Is this a gap in his training, or in his nerve?', 'What would Rysen note in his mental catalogue about this environment?', 'How does this moment register against his Ember rank — does it fit, exceed, or fall short?']
    },
    combat: {
      label: 'Combat',
      quick: ['Rysen tries to gain the upper hand', 'An enemy lands something unexpected', 'Rysen is outnumbered but not outmatched'],
      outcomes: {
        fumble: ['He gets hurt — genuinely, significantly. This is not training. Something needs to change or he doesn\'t walk out.', 'The Riftborn/opponent adapts. The technique Rysen relied on has been read. It won\'t work again this fight.', 'He\'s down. Not out — the Shadow won\'t allow out — but down. The floor tastes like mud and the fight has a new shape now.'],
        failure: ['He misses, or takes the hit he was trying to avoid. The exchange goes against him.', 'Blocked, redirected, or simply wrong — he did the right thing at the wrong moment or the wrong thing entirely.', 'The fight slips. He\'s behind now, and behind in a real fight has a cost.'],
        mixed: ['He lands something, or avoids something — but not both. The trade was not in his favor.', 'Progress, but he\'s bleeding for it. Write the exchange: he gave something to take something.', 'It works, and it hurts him. Describe the cost alongside the gain.'],
        success: ['Clean exchange. He did what he intended to do and the fight has turned, at least for this moment.', 'Effective. Not flashy — efficient. The kind of combat that looks like nothing is happening until it\'s over.', 'He lands it, avoids the counter, and the opponent has now recalibrated their approach.'],
        critical: ['The Shadow\'s margin, even without its emergence. This is Rysen at his operational ceiling — a flash of what he will eventually be.', 'Decisive. The kind of move that ends a section of the fight, not just an exchange. Write it like it deserves.', 'Extraordinary. The Riftborn/opponent did not anticipate this. Neither, perhaps, did Rysen.']
      },
      prompts: ['Where is Rysen bleeding, and is he tracking it?', 'Does the Shadow stir — does this feel like it might pull it to the surface?', 'What is the fighter\'s voice in his head saying right now?']
    },
    shadow: {
      label: 'The Shadow',
      quick: ['The Shadow surfaces during crisis', 'Rysen tries to pull it back', 'The Shadow speaks when pushed to the edge'],
      outcomes: {
        fumble: ['The Shadow surges beyond what Rysen can contain. He comes back to himself with gaps in his memory and evidence of what happened. It frightens him. It should.', 'The attempt to use or suppress the Shadow fails — it does what it wants. The aftermath is something Rysen has to live with.', 'Total surface. The Shadow does not just assist — it takes the moment. Rysen is passenger. What it does is effective, precise, and cold in a way his humor never is.'],
        failure: ['He reaches for it and finds the wall between them. The Shadow does not come when called. It comes when it decides.', 'The suppression fails — the Shadow bleeds into his voice, his eyes, his stillness. People around him notice something has changed.', 'The attempt to use the Shadow costs more than the Shadow delivers. This is not a cooperative relationship. Yet.'],
        mixed: ['The Shadow surfaces partially — the eyes go flat, the voice drops. He gets the edge he needed. He does not get to fully own it afterward.', 'It helps, but its presence lingers longer than it should. He has to work to feel like himself again.', 'The Shadow lends him what he needed — and leaves one sentence in his internal voice that he knows isn\'t his.'],
        success: ['The Shadow is present, controlled, useful. He is Rysen — but he is also what the Shadow makes him in a fight. The line holds.', 'The cold clarity arrives on cue. He uses it, returns from it, and the transition is clean enough that no one sees the seam.', 'Rysen operates in the Shadow\'s margin without losing the wheel. He\'s still driving. But he borrowed something.'],
        critical: ['Perfect alignment — not possession, not suppression, but the moment they operate as one. This is what it could become. It is also, briefly, terrifying.', 'The Shadow voices something precisely true. Not a taunt. Not cruelty. A clarity so sharp it rearranges the fight.', 'He does something the Shadow would call worthy. The Shadow does not say so. It also does not recede.']
      },
      prompts: ['What does Rysen notice about his own voice afterward?', 'Who in the scene would have caught something wrong in his eyes, even for a second?', 'What sentence does the Shadow leave behind in his internal voice?']
    },
    social: {
      label: 'Social',
      quick: ['Extracting information from a reluctant source', 'Rysen tries to read whether someone is lying', 'A conversation that needs to go somewhere specific'],
      outcomes: {
        fumble: ['He misreads completely — the warmth was performance, or the hostility was protection, and he got it exactly backwards. Lana-shaped lesson. Filed, at cost.', 'The facade he was maintaining collapses. Something real slips out — truth, grief, anger — and now the other person knows something they shouldn\'t.', 'Trust is actively damaged. The relationship, such as it was, now has a splinter in it.'],
        failure: ['They don\'t give him what he\'s looking for. He doesn\'t know yet whether that means they don\'t have it or that they don\'t trust him with it.', 'The approach was wrong for this person. He chose the key that doesn\'t fit. He knows it. They probably do too.', 'The conversation ends without what he came for — but it wasn\'t wasted. He knows something about this person that he didn\'t before.'],
        mixed: ['He gets the information, but it comes with conditions — an obligation, a debt, or a watched expression he\'ll have to think about later.', 'Partial truth. They gave him something real — and kept something real back. He can tell, if only barely.', 'The conversation lands somewhere it wasn\'t going. Not better, not worse — adjacent to what he wanted.'],
        success: ['He reads them correctly and works with what\'s true about them. The information comes.', 'The warmth is not performance — it\'s rapport. Something human passed between them, and that\'s why it worked.', 'Clean. They told him what he needed, and the conversation closes without new complications.'],
        critical: ['He sees all of it — what they\'re hiding, why they\'re hiding it, and what it would take to reach them. He uses exactly that.', 'The connection is real. Whatever they give him, they give willingly, and for a moment this person is an ally, not a source.', 'More than he came for. The critical roll finds the thing that wasn\'t on offer and gets it anyway.']
      },
      prompts: ['What does Rysen notice about how this person holds themselves when the question lands?', 'Is there a flash of Lana here — does he catch himself trusting warmth and pull back?', 'What\'s the lie he tells himself about why this worked or didn\'t?']
    },
    world: {
      label: 'World Event',
      quick: ['A Rift event in an unexpected location', 'The Black Hand moves', 'The Azrake Code activates'],
      outcomes: {
        fumble: ['The worst possible timing. Whatever was already in motion accelerates. The world has decided to make this harder.', 'A new threat enters the field. It doesn\'t care about Rysen\'s current problem — which is exactly what makes it a problem.', 'An event from the past surfaces. Something Rysen did, or didn\'t do, has a consequence now.'],
        failure: ['The world does not cooperate. Circumstances shift against the plan — not through betrayal, just through the ordinary obstruction of things.', 'External forces complicate the path. The map was right, but the territory has changed.', 'The network shows its range. Someone knew something before Rysen did, and they used that margin.'],
        mixed: ['Something shifts in the world — for better and worse simultaneously. The opportunity is real. So is the new problem.', 'An event creates an opening and closes one. Net result: lateral. But the landscape has changed.', 'Progress comes attached to an obligation or a witness or a consequence that Rysen will have to manage.'],
        success: ['The world bends in a useful direction. Timing aligns. The next step becomes clearer.', 'An external event creates cover, opportunity, or information that helps — without being earned, just lucky.', 'The Azrake Code — never give up, use everything, pull every thread — pays a dividend. Something they built or found or survived earlier is useful now.'],
        critical: ['The world gives something remarkable. A connection, a coincidence, a convergence that could only happen at this exact moment.', 'Tyson sends findings. Damien pulls a thread. Rysen is not alone in this, and right now, the network shows why.', 'Something the Black Hand did not anticipate becomes the exact lever Rysen needed. The patient villain made one mistake. Find it.']
      },
      prompts: ['Which brother would hear about this first, and how would they frame it?', 'What does this event tell Rysen about the Black Hand\'s reach?', 'Is his mother\'s trail warmer or colder after this?']
    },
    investigation: {
      label: 'Investigation',
      quick: ['Decoding the Black Hand book', 'Following a symbol to its source', 'Piecing together what the village was hiding'],
      outcomes: {
        fumble: ['The clue was misread — he followed it confidently in the wrong direction. The error will cost time and perhaps more.', 'Something he was using as evidence turns out to be misdirection. Planted, or simply coincidence given meaning it didn\'t have.', 'A piece of the puzzle is destroyed or lost. It will not be recovered. The shape of the mystery changes.'],
        failure: ['The thread doesn\'t lead anywhere useful. Either it\'s a dead end or he doesn\'t have the context to read it yet.', 'He sees the shape of something but not the thing itself. The knowledge is present somewhere — he doesn\'t have the key yet.', 'He gets close enough to know he\'s close. And no closer.'],
        mixed: ['A correct conclusion — but partial. He has one piece of the picture, and the picture is larger than he thought.', 'The information arrives. It opens one door and closes another. Net new questions equals net new answers.', 'He finds something real — but it raises a question he wasn\'t ready for, about the Black Hand, his mother, or both.'],
        success: ['The connection clicks. He had the pieces; now he has them in order. Write the moment the pattern becomes legible.', 'Clean deduction. What was obscure is now directional. The next step is visible even if the destination isn\'t.', 'The book gives something up. A name, a location, a fragment of what Kaidalyn was tracking. One step closer.'],
        critical: ['The full shape of a thing becomes visible. Not just what it is — but what it means in context, why it matters, who built it and why.', 'A thread connects to another thread connects to another — and for a moment Rysen can see the architecture of the Black Hand from the outside.', 'He finds something his mother left deliberately. A marker. A message. Confirmation that she was here, that she was careful, that she knew she was being followed.']
      },
      prompts: ['Does Tyson\'s forensic voice appear in Rysen\'s internal monologue here?', 'What is the one thing in the Black Hand book he can\'t quite read yet, but suspects?', 'Where does this lead — to the next city, or deeper into this one?']
    }
  };

  function setCategory(cat) {
    category = cat;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + cat).classList.add('active');
    updateQuickRolls();
  }

  function updateQuickRolls() {
    const strip = document.getElementById('quickRolls');
    const qs = CATEGORIES[category].quick;
    strip.innerHTML = qs.map(q =>
      `<button class="quick-roll-btn" onclick="setContext('${q.replace(/'/g, "\\'")}')">${q}</button>`
    ).join('');
  }

  function setContext(text) {
    document.getElementById('rollContext').value = text;
  }

  function selectDice(n) {
    currentDice = n;
    document.querySelectorAll('.dice-btn').forEach(b => b.classList.remove('selected'));
    const ids = {4:'d4', 6:'d6', 20:'d20', 100:'d100'};
    document.getElementById(ids[n]).classList.add('selected');
  }

  function changeMod(delta) {
    modifier = Math.max(-5, Math.min(10, modifier + delta));
    document.getElementById('modValue').textContent = modifier >= 0 ? '+' + modifier : modifier;
  }

  function setAdvantage(mode) {
    advantage = mode;
    document.querySelectorAll('.adv-btn').forEach(b => {
      b.classList.remove('selected-adv', 'selected-dis', 'selected-norm');
    });
    const cls = mode === 'advantage' ? 'selected-adv' : mode === 'disadvantage' ? 'selected-dis' : 'selected-norm';
    document.getElementById('adv-' + mode).classList.add(cls);
  }

  function roll(sides) {
    return Math.floor(Math.random() * sides) + 1;
  }

  function getTier(total, sides) {
    const pct = total / sides;
    if (sides === 20) {
      const raw = parseInt(document.getElementById('rollNumber').dataset.raw || total);
      if (raw === 20) return 'critical';
      if (raw === 1) return 'fumble';
      if (total >= 17) return 'critical';
      if (total >= 12) return 'success';
      if (total >= 7) return 'mixed';
      if (total >= 2) return 'failure';
      return 'fumble';
    }
    if (pct >= 0.9) return 'critical';
    if (pct >= 0.65) return 'success';
    if (pct >= 0.35) return 'mixed';
    if (pct >= 0.1) return 'failure';
    return 'fumble';
  }

  const TIER_LABELS = {
    critical: 'CRITICAL · EXCEPTIONAL',
    success: 'SUCCESS',
    mixed: 'MIXED SUCCESS · COMPLICATION',
    failure: 'FAILURE',
    fumble: 'FUMBLE · THE WORST OF IT'
  };

  function rollDice() {
    const overlay = document.getElementById('rollingOverlay');
    overlay.classList.add('active');

    setTimeout(() => {
      overlay.classList.remove('active');
      executeRoll();
    }, 600);
  }

  function executeRoll() {
    let r1 = roll(currentDice);
    let r2 = roll(currentDice);
    let rawRoll, breakdown;

    if (advantage === 'advantage') {
      rawRoll = Math.max(r1, r2);
      breakdown = `Rolled ${r1} & ${r2}, took ${rawRoll} (advantage)`;
    } else if (advantage === 'disadvantage') {
      rawRoll = Math.min(r1, r2);
      breakdown = `Rolled ${r1} & ${r2}, took ${rawRoll} (disadvantage)`;
    } else {
      rawRoll = r1;
      breakdown = `Rolled ${r1}`;
    }

    const total = Math.max(1, Math.min(currentDice, rawRoll + modifier));
    if (modifier !== 0) breakdown += ` + (${modifier >= 0 ? '+' : ''}${modifier}) = ${total}`;

    const tier = getTier(total, currentDice);
    const catData = CATEGORIES[category];
    const outcomes = catData.outcomes[tier];
    const narrative = outcomes[Math.floor(Math.random() * outcomes.length)];
    const prompt = catData.prompts[Math.floor(Math.random() * catData.prompts.length)];
    const context = document.getElementById('rollContext').value;

    // Update display
    const display = document.getElementById('resultDisplay');
    display.className = 'result-display visible';

    document.getElementById('diceVisual').textContent = DICE_EMOJIS[currentDice] || '🎲';

    const numEl = document.getElementById('rollNumber');
    numEl.textContent = total;
    numEl.className = 'roll-number ' + tier;
    numEl.dataset.raw = rawRoll;

    document.getElementById('rollBreakdown').textContent = breakdown;

    const tierEl = document.getElementById('resultTier');
    tierEl.textContent = TIER_LABELS[tier];
    tierEl.className = 'result-tier ' + tier;

    document.getElementById('narrativeResult').textContent = narrative;
    document.getElementById('writingPrompt').textContent = '✦ ' + prompt;

    // Add to history
    const entry = { total, tier, context: context || category, narrative: narrative.substring(0, 80) + '...' };
    rollHistory.unshift(entry);
    if (rollHistory.length > 20) rollHistory.pop();
    updateHistory();
  }

  function updateHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    section.style.display = rollHistory.length > 0 ? 'block' : 'none';

    list.innerHTML = rollHistory.map(entry => `
      <div class="history-item">
        <span class="history-roll ${entry.tier}">${entry.total}</span>
        <div class="history-text">
          <div class="history-context">${entry.context}</div>
          <div class="history-outcome">${entry.narrative}</div>
        </div>
      </div>
    `).join('');
  }

  function clearHistory() {
    rollHistory = [];
    updateHistory();
  }

  // Init
  updateQuickRolls();
</script>
</body>
</html>
